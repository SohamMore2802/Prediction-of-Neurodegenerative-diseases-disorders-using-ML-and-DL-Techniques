<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>NeuroCognitive Insights – Login/Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header .logo-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            margin: 0 auto 15px;
        }

        .auth-header h1 {
            margin: 0;
            color: #333;
            font-size: 24px;
        }

        .auth-header p {
            margin: 5px 0 0;
            color: #666;
            font-size: 14px;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #e5e5e5;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .auth-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .auth-form-section {
            display: none;
        }

        .auth-form-section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input.error {
            border-color: #dc3545;
        }

        .error-message {
            color: #dc3545;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .form-group input.error ~ .error-message {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .info-message {
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }

        .info-message.show {
            display: block;
        }

        .info-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .info-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .remember-forgot a {
            color: #667eea;
            text-decoration: none;
        }

        .remember-forgot a:hover {
            text-decoration: underline;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            cursor: pointer;
        }

        .form-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .form-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-circle">NC</div>
                <h1>NeuroCognitive Insights</h1>
                <p>AI-assisted screening for neurological disorders</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Login</button>
                <button class="auth-tab" data-tab="register">Register</button>
            </div>

            <!-- LOGIN FORM -->
            <form id="login-form" class="auth-form-section active">
                <div id="login-message" class="info-message"></div>

                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" name="email" placeholder="your@email.com" required />
                    <span class="error-message">Please enter a valid email</span>
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" placeholder="Enter your password" required />
                    <span class="error-message">Password is required</span>
                </div>

                <div class="remember-forgot">
                    <label class="checkbox-group">
                        <input type="checkbox" id="remember-me" name="remember" />
                        <span>Remember me</span>
                    </label>
                    <a href="#forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="submit-btn">Login</button>
            </form>

            <!-- REGISTER FORM -->
            <form id="register-form" class="auth-form-section">
                <div id="register-message" class="info-message"></div>

                <div class="form-group">
                    <label for="register-name">Full Name</label>
                    <input type="text" id="register-name" name="full_name" placeholder="John Doe" required />
                    <span class="error-message">Full name is required</span>
                </div>

                <div class="form-group">
                    <label for="register-email">Email Address</label>
                    <input type="email" id="register-email" name="email" placeholder="your@email.com" required />
                    <span class="error-message">Please enter a valid email</span>
                </div>

                <div class="form-group">
                    <label for="register-password">Password</label>
                    <input type="password" id="register-password" name="password" placeholder="Min. 8 characters" required />
                    <span class="error-message">Password must be at least 8 characters</span>
                </div>

                <div class="form-group">
                    <label for="register-confirm">Confirm Password</label>
                    <input type="password" id="register-confirm" name="confirm_password" placeholder="Confirm your password" required />
                    <span class="error-message">Passwords do not match</span>
                </div>

                <label class="checkbox-group" style="margin-bottom: 15px;">
                    <input type="checkbox" id="terms" name="terms" required />
                    <span>I agree to the Terms and Conditions</span>
                </label>

                <button type="submit" class="submit-btn">Register</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = "http://localhost:8000";

        // Tab switching
        document.querySelectorAll(".auth-tab").forEach(tab => {
            tab.addEventListener("click", () => {
                const tabName = tab.dataset.tab;
                
                // Update active tab
                document.querySelectorAll(".auth-tab").forEach(t => t.classList.remove("active"));
                tab.classList.add("active");

                // Update active form
                document.querySelectorAll(".auth-form-section").forEach(form => {
                    form.classList.remove("active");
                });
                document.getElementById(`${tabName}-form`).classList.add("active");
            });
        });

        // Login form submission
        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("login-email").value;
            const password = document.getElementById("login-password").value;
            const rememberMe = document.getElementById("remember-me").checked;

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();

                if (response.ok) {
                    // Store token and user info
                    localStorage.setItem("token", data.token);
                    localStorage.setItem("user", JSON.stringify(data.user));
                    if (rememberMe) {
                        localStorage.setItem("rememberMe", "true");
                    }

                    showMessage("login-message", "Login successful! Redirecting...", "success");
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1500);
                } else {
                    showMessage("login-message", data.detail || "Login failed", "error");
                }
            } catch (error) {
                showMessage("login-message", "Network error. Please try again.", "error");
            }
        });

        // Register form submission
        document.getElementById("register-form").addEventListener("submit", async (e) => {
            e.preventDefault();

            const fullName = document.getElementById("register-name").value;
            const email = document.getElementById("register-email").value;
            const password = document.getElementById("register-password").value;
            const confirmPassword = document.getElementById("register-confirm").value;

            // Validate passwords match
            if (password !== confirmPassword) {
                showMessage("register-message", "Passwords do not match", "error");
                return;
            }

            // Validate password length
            if (password.length < 8) {
                showMessage("register-message", "Password must be at least 8 characters", "error");
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ full_name: fullName, email, password }),
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage("register-message", "Registration successful! Redirecting to login...", "success");
                    setTimeout(() => {
                        document.querySelector('[data-tab="login"]').click();
                        document.getElementById("login-email").value = email;
                    }, 1500);
                } else {
                    showMessage("register-message", data.detail || "Registration failed", "error");
                }
            } catch (error) {
                showMessage("register-message", "Network error. Please try again.", "error");
            }
        });

        function showMessage(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = `info-message show ${type}`;
            
            if (type === "error") {
                setTimeout(() => {
                    element.classList.remove("show");
                }, 5000);
            }
        }

        // Auto-fill login if remember me was checked
        window.addEventListener("load", () => {
            if (localStorage.getItem("rememberMe") === "true") {
                const user = JSON.parse(localStorage.getItem("user") || "{}");
                if (user.email) {
                    document.getElementById("login-email").value = user.email;
                    document.getElementById("remember-me").checked = true;
                }
            }
        });
    </script>
</body>
</html>
